<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cool CSS Features Showcase</title>
    <link rel="stylesheet" href="css1/style.css">
</head>
<body>

    <div class="container">
        <div class="card gradient-border">
            <h2>01 / Dynamic Borders</h2>
            <p>This card uses modern CSS <code>@property</code> to animate a gradient border seamlessly without complex JavaScript hacks.</p>
        </div>

        <div class="card glassmorphism">
            <h2>02 / Glassmorphism</h2>
            <p>By leveraging <code>backdrop-filter: blur()</code>, this card mimics realistic frosted glass, blending beautifully with the background.</p>
        </div>
    </div>

</body>
</html>
